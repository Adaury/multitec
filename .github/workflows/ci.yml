name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - run: pip install -r requirements-dev.txt
      - run: pytest -v

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  deploy-scripts:
    name: Deploy scripts (PowerShell syntax)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse every .ps1 for syntax errors
        shell: powershell
        run: |
          $failed = $false
          Get-ChildItem -Path deploy -Filter *.ps1 | ForEach-Object {
            $errors = $null
            $tokens = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              Write-Host "::error file=$($_.Name)::Syntax error(s) found"
              $errors | ForEach-Object { Write-Host "  $($_.Message) at line $($_.Extent.StartLineNumber)" }
            } else {
              Write-Host "$($_.Name) -> OK"
            }
          }
          if ($failed) { exit 1 }
