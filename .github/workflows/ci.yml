name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - run: pip install -r requirements-dev.txt
      - run: pytest -v

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./e2e.db
      JWT_SECRET: e2e-test-secret-not-for-production
      ADMIN_EMAIL: admin@multitec.com
      ADMIN_PASSWORD: change-this-password
      CORS_ORIGINS: http://localhost:5173
      UPLOAD_DIR: ./uploads
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up backend (SQLite, seeded admin)
        working-directory: backend
        run: |
          pip install -r requirements.txt
          alembic upgrade head
          python -m app.db.seed

      - name: Start backend
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --port 8000 > /tmp/backend.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/health > /dev/null; then break; fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8000/api/health || (cat /tmp/backend.log && exit 1)

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps and Playwright browsers
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start frontend
        working-directory: frontend
        run: |
          nohup npm run dev -- --port 5173 > /tmp/frontend.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5173 > /dev/null; then break; fi
            sleep 1
          done
          curl -sf http://127.0.0.1:5173 || (cat /tmp/frontend.log && exit 1)

      - name: Run Playwright tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Show backend log on failure
        if: failure()
        run: cat /tmp/backend.log

  deploy-scripts:
    name: Deploy scripts (PowerShell syntax)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse every .ps1 for syntax errors
        shell: powershell
        run: |
          $failed = $false
          Get-ChildItem -Path deploy -Filter *.ps1 | ForEach-Object {
            $errors = $null
            $tokens = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              Write-Host "::error file=$($_.Name)::Syntax error(s) found"
              $errors | ForEach-Object { Write-Host "  $($_.Message) at line $($_.Extent.StartLineNumber)" }
            } else {
              Write-Host "$($_.Name) -> OK"
            }
          }
          if ($failed) { exit 1 }
